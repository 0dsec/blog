<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    { "imports": { "@chenglou/pretext": "https://esm.sh/@chenglou/pretext" } }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="pretext-demo.js"></script>
</head>
<body>

  <header id="site-header" style="width:100%;max-width:720px;padding:2.5rem 1.5rem 1rem;text-align:left;">
    <a href="index.html" class="back-link">&larr; back to posts</a>
  </header>

  <main id="single-post">
    <div id="single-loading" class="loading-msg">loading_</div>
  </main>

  <footer id="site-footer">
    <span class="footer-text">0daze &bull; 2026</span>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const params = new URLSearchParams(window.location.search);
    const postId = parseInt(params.get('id'), 10);

    if (!postId) {
      document.getElementById('single-post').innerHTML =
        '<p class="error-msg">no post id found. <a href="index.html">go back</a></p>';
    } else {
      loadSinglePost(postId);
    }


    async function loadSinglePost(id) {
      try {
        const res = await fetch('data/posts.json');
        const posts = await res.json();
        const post = posts.find(p => p.id === id);

        if (!post) {
          document.getElementById('single-post').innerHTML =
            '<p class="error-msg">post not found. <a href="index.html">go back</a></p>';
          return;
        }

        document.title = post.title + ' — 0daze';

        let bodyHtml;
        if (post.custom === 'pretext') {

          let introHtml = '';
          if (post.file) {
            try {
              const introRes = await fetch('posts/' + post.file);
              const introMd = await introRes.text();
              introHtml = '<div class="markdown-body">' + marked.parse(introMd) + '</div>';
            } catch (e) {
              console.error('Failed to load pretext intro:', e);
            }
          }
          bodyHtml = '<div class="post-body">' + introHtml +
                     '<div class="pretext-stage"><canvas class="pretext-canvas"></canvas></div></div>';
        } else {
          const mdRes = await fetch('posts/' + post.file);
          const mdText = await mdRes.text();
          bodyHtml = '<div class="post-body markdown-body">' + marked.parse(mdText) + '</div>';
        }

        const container = document.getElementById('single-post');
        container.innerHTML =
          '<article class="single-article">' +
            '<div class="post-meta-row">' +
              '<time class="post-date">' + post.date + '</time>' +
              '<div class="post-tags">' +
                post.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') +
              '</div>' +
            '</div>' +
            '<h1 class="single-title">' + post.title + '</h1>' +
            (post.quote ? '<p class="post-quote">' + post.quote + '</p>' : '') +
            bodyHtml +
            '<div class="single-nav">' +
              '<a href="index.html" class="back-link">&larr; back to posts</a>' +
            '</div>' +
          '</article>';

        animateQuote(container.querySelector('.post-quote'));

        if (post.custom === 'pretext' && window.initPretextDemo) {
          requestAnimationFrame(function() {
            window.initPretextDemo(container.querySelector('.pretext-stage'));
          });
        }

      } catch (err) {
        console.error('Failed to load post:', err);
        document.getElementById('single-post').innerHTML =
          '<p class="error-msg">failed to load post. <a href="index.html">go back</a></p>';
      }
    }

    function animateQuote(quoteEl) {
      if (!quoteEl) return;
      var text = quoteEl.textContent;
      quoteEl.textContent = '';
      quoteEl.style.visibility = 'visible';
      var i = 0;
      var interval = setInterval(function() {
        i++;
        quoteEl.textContent = text.slice(0, i);
        if (i >= text.length) clearInterval(interval);
      }, 30);
    }
  </script>
</body>
</html>
